<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>正在開啟 LINE 分享</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172026;
      --muted: #61707a;
      --line: #d9e0e5;
      --accent: #0f8b6f;
      --surface: #f4f7f8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background: var(--surface);
    }

    main {
      width: min(390px, 100%);
      padding: 28px 22px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 18px 50px rgba(23, 32, 38, 0.12);
    }

    .mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      margin-bottom: 18px;
      color: #fff;
      background: var(--accent);
      font-weight: 800;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.25;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    button {
      width: 100%;
      min-height: 48px;
      margin-top: 18px;
      border: 0;
      border-radius: 10px;
      color: #fff;
      background: var(--accent);
      font-size: 16px;
      font-weight: 800;
    }

    button:disabled {
      opacity: 0.7;
    }

    .diagnostics {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .diagnostics h2 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    .diagnostics pre {
      min-height: 120px;
      max-height: 280px;
      overflow: auto;
      margin: 0;
      padding: 12px;
      border-radius: 8px;
      color: #25313a;
      background: #f7fafb;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <main>
    <div class="mark">R</div>
    <h1 id="shareTitle">正在開啟 LINE 通訊錄</h1>
    <p id="shareStatus">請稍候，系統會直接開啟分享對象選擇器。</p>
    <button id="retryShare" type="button" disabled>處理中...</button>
    <section class="diagnostics" aria-label="分享診斷">
      <h2>分享診斷</h2>
      <pre id="shareDiagnostics">正在收集狀態...</pre>
    </section>
  </main>
  <script src="share.js"></script>
</body>
</html>
